<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tugas 3 Vue UT</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="dashboard-page">

<div id="app">

  <header>
    <h2>Selamat Datang</h2>
    <span class="header-logo">Universitas Terbuka</span>
  </header>

  <div class="navbar">
    <a href="#" @click.prevent="tab='dashboard'" :class="{active: tab === 'dashboard'}">Dashboard</a>
    <a href="#" @click.prevent="tab='stok'" :class="{active: tab === 'stok'}">Informasi Bahan Ajar</a>
    <a href="#" @click.prevent="tab='tracking'" :class="{active: tab === 'tracking'}">Tracking Pengiriman</a>

    <div class="dropdown">
      <button class="dropbtn">Laporan ▾</button>
      <div class="dropdown-content">
        <a href="#">Monitoring Progress DO</a>
        <a href="#">Rekap Bahan Ajar</a>
      </div>
    </div>

    <a href="#">Histori Transaksi</a>
    <button class="btn-logout" @click="logout">⏻ Logout</button>
  </div>

  <div class="container">

    <section v-show="tab === 'dashboard'">
      <div class="stats-row">
        <div class="stat-box">
          <div class="label">Total Stok Bahan Ajar</div>
          <div class="value">{{ state.stok.length }}</div>
        </div>
        <div class="stat-box">
          <div class="label">Total Paket</div>
          <div class="value">{{ state.paket.length }}</div>
        </div>
        <div class="stat-box">
          <div class="label">Total UPBJJ</div>
          <div class="value">{{ state.upbjjList.length }}</div>
        </div>
      </div>
    </section>

    <section v-show="tab === 'stok'">
      <ba-stock-table
        :items="state.stok"
        :upbjj-list="state.upbjjList"
        :kategori-list="state.kategoriList">
      </ba-stock-table>
    </section>

    <section v-show="tab === 'tracking'">
      <do-tracking
        :tracking="state.tracking"
        :paket="state.paket"
        :pengiriman-list="state.pengirimanList">
      </do-tracking>
    </section>

  </div>

</div>

<!-- templates are loaded from /templates/*.html by js/services/api.js -->

<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<script src="js/components/status-badge.js"></script>
<script src="js/components/app-modal.js"></script>
<script src="js/components/stock-table.js"></script>
<script src="js/components/do-tracking.js"></script>
<script src="js/components/order-form.js"></script>

<script src="js/services/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
